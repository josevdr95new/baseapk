<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3F51B5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HTML2APK Test App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 30px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .logo svg {
            width: 80px;
            height: 80px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .features {
            text-align: left;
            margin-bottom: 30px;
        }

        .feature {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .feature:last-child {
            border-bottom: none;
        }

        .feature-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 16px;
        }

        .feature-text {
            flex: 1;
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .version {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }

        .counter {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .counter-value {
            font-size: 48px;
            font-weight: 700;
            display: block;
        }

        .counter-label {
            font-size: 14px;
            opacity: 0.8;
        }

        .status {
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }

        .status.success {
            background: rgba(76, 175, 80, 0.3);
        }

        .status.info {
            background: rgba(33, 150, 243, 0.3);
        }

        .webview-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            font-size: 12px;
            text-align: left;
        }

        .webview-info code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="#667eea">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
        </div>

        <h1>HTML2APK Test</h1>
        <p class="subtitle">Web content running in Android WebView</p>

        <div class="counter">
            <span class="counter-value" id="counter">0</span>
            <span class="counter-label">Button Clicks</span>
        </div>

        <button class="btn" id="incrementBtn">Click Me!</button>

        <div class="status success" id="status">
            WebView is working correctly!
        </div>

        <div class="webview-info">
            <strong>WebView Information:</strong><br>
            Platform: <code id="platform">-</code><br>
            User Agent: <code id="userAgent">-</code><br>
            Screen: <code id="screen">-</code>
        </div>

        <p class="version">HTML2APK v1.0.0</p>
    </div>

    <script>
        // Counter functionality
        let count = 0;
        const counterEl = document.getElementById('counter');
        const incrementBtn = document.getElementById('incrementBtn');

        incrementBtn.addEventListener('click', function() {
            count++;
            counterEl.textContent = count;

            // Animate the counter
            counterEl.style.transform = 'scale(1.2)';
            setTimeout(() => {
                counterEl.style.transform = 'scale(1)';
            }, 100);
        });

        // Display WebView information
        document.getElementById('platform').textContent = navigator.platform;
        document.getElementById('userAgent').textContent = navigator.userAgent.substring(0, 50) + '...';
        document.getElementById('screen').textContent = window.innerWidth + 'x' + window.innerHeight;

        // Local storage persistence
        if (localStorage.getItem('counter')) {
            count = parseInt(localStorage.getItem('counter'));
            counterEl.textContent = count;
        }

        incrementBtn.addEventListener('click', function() {
            localStorage.setItem('counter', count);
        });

        // Show success message
        console.log('HTML2APK WebView Test - Loaded Successfully');
    </script>
</body>
</html>
